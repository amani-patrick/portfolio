<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" role="img" aria-labelledby="title desc">
  <title id="title">Team collaboration</title>
  <desc id="desc">Three stylized people connected with lines forming a collaborative network (light-colored)</desc>

  <!-- Explicit light-color palette (does not rely on currentColor or theme) -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left person (blue) -->
    <g transform="translate(2,0)">
      <circle cx="4.8" cy="8.5" r="2.1" fill="#6EC6FF" stroke="#3AA0E6" stroke-width="0.5"/>
      <path d="M2.6 13.4c0-1.5 1.7-2.8 3.8-2.8" fill="#DFF4FF" stroke="#9FDFF8" stroke-width="0.6"/>
    </g>

    <!-- Center person (mint) -->
    <g transform="translate(6,0)">
      <circle cx="12" cy="15" r="2.2" fill="#7CF2C7" stroke="#2FBF85" stroke-width="0.5"/>
      <path d="M9.8 13.1c0-1.4 1.8-2.7 4-2.7" fill="#E8FFF4" stroke="#BFF8DA" stroke-width="0.6"/>
    </g>

    <!-- Right person (warm) -->
    <g transform="translate(10,0)">
      <circle cx="17.2" cy="8.5" r="2" fill="#FFD47C" stroke="#E6A800" stroke-width="0.5"/>
      <path d="M14.9 13.3c0-1.4 1.6-2.6 3.6-2.6" fill="#FFF4E0" stroke="#FFE4B3" stroke-width="0.6"/>
    </g>

    <!-- Connectors (subtle grey) -->
    <path d="M8.4 10.3L11 13" stroke="#B7C2C9" stroke-width="1"/>
    <path d="M13 13l2.6-2.9" stroke="#B7C2C9" stroke-width="1"/>

    <!-- Soft halo to suggest collaboration (very light) -->
    <circle cx="12" cy="9.8" r="6.2" stroke="#CBD6DD" stroke-opacity="0.18" stroke-width="0.8" fill="none"/>
  </g>
</svg>
